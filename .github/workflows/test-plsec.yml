# test-plsec.yml - CI for plsec Python CLI
#
# Runs lint (ruff + ty), pytest with Python version matrix, and
# dogfood scan (plsec scan on own codebase). Triggers on Python
# source, test, and dependency changes.
#
# Python version matrix: min supported (3.12) + latest (3.14).
# Update matrix when pyproject.toml requires-python changes or
# new Python versions are released.

name: Test plsec

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - '!tests/bats/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test-plsec.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '!tests/bats/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test-plsec.yml'
  release:
    types: [published]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format . --check
      - name: Type check
        run: uv run ty check src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Min supported + latest. See pyproject.toml requires-python.
        python-version: ['3.12', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: py${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Run pytest
        run: uv run pytest tests/ --ignore=tests/bats -v --tb=short

  scan:
    name: Dogfood scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.5
      - name: Install dependencies
        run: uv sync --dev
      - name: Install scan tools
        run: uv run pip install bandit semgrep
      - name: Run plsec scan
        run: uv run plsec scan .
