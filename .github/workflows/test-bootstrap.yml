# test-bootstrap.yml - CI for bin/bootstrap.sh
#
# Runs BATS unit tests on Linux, integration tests in containers (Linux)
# and natively (macOS), across mode and agent combinations.

name: Test bootstrap.sh

on:
  push:
    paths: ['bin/bootstrap.sh', 'tests/bats/**', 'templates/**', '.github/workflows/test-bootstrap.yml']
  pull_request:
    paths: ['bin/bootstrap.sh', 'tests/bats/**', 'templates/**', '.github/workflows/test-bootstrap.yml']
  release:
    types: [published]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install BATS
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Build bootstrap.sh
        run: make build
      - name: Run unit tests
        run: make test-unit

  integration-linux:
    name: Integration (Linux container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build and test in container
        run: make test-container

  integration-macos:
    name: Integration (macOS - ${{ matrix.agent }} ${{ matrix.mode }})
    strategy:
      fail-fast: false
      matrix:
        mode: ['--strict', '']
        agent: [claude, opencode, both]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install BATS
        run: brew install bats-core
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.5
      - name: Install Python (for JSON/YAML validation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Build and run integration tests
        run: |
          make build
          make test-integration
