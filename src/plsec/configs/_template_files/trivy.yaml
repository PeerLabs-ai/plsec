scan:
  scanners:
    - vuln
    - secret
    - misconfig
  skip-dirs:
    - .venv
    - .tox
    - node_modules
    - build
    - dist
    - .eggs
    - __pycache__
  skip-files:
    - "**/*.pyc"

secret:
  config: trivy-secret.yaml

severity:
  - CRITICAL
  - HIGH
  - MEDIUM

format: table
exit-code: 1
