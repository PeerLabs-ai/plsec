# trivy-secret.yaml - LLM-tuned secret detection
# Disable allow-rules: LLMs put secrets in unexpected places

disable-allow-rules:
  - markdown
  - tests
  - testdata

rules:
  # Generic patterns (catch hallucinated secrets)
  - id: generic-api-key
    category: generic
    title: Generic API Key
    severity: HIGH
    keywords: [api_key, apikey, api-key, API_KEY]
    regex: (?i)(api[_-]?key|apikey)['":\s]*[=:]\s*['"]?([A-Za-z0-9_\-\/+=]{20,})['"]?

  # IMPORTANT: generic-secret rule limitations
  #
  # This rule requires assignment context (= or :) to reduce false positives
  # in documentation and test files. This means:
  #
  # WILL DETECT:
  #   - SECRET_KEY = "abc123..."
  #   - "secret": "abc123..."
  #   - export SECRET=abc123
  #
  # WILL NOT DETECT:
  #   - Secrets without assignment operators (e.g., "secret_value abc123")
  #   - Secrets in unusual formats or comment-only contexts
  #   - Hard-coded secrets in string concatenation without clear assignment
  #
  # If you suspect missed secrets, run: trivy fs --scanners secret --severity HIGH,CRITICAL
  # with a custom config that removes the assignment requirement.
  #
  # See: docs/scanner-limitations.md for full details
  #
  - id: generic-secret
    category: generic
    title: Generic Secret/Token
    severity: HIGH
    keywords: [secret, token, password, auth]
    regex: (?i)(secret|token|password|auth[_-]?token)\s*[=:]\s*['"]?[A-Za-z0-9_\-\/+=]{12,}['"]?

  - id: private-key
    category: generic
    title: Private Key
    severity: CRITICAL
    keywords: ["BEGIN RSA PRIVATE KEY", "BEGIN EC PRIVATE KEY", "BEGIN OPENSSH PRIVATE KEY", "BEGIN PRIVATE KEY"]
    regex: "-----BEGIN (RSA |EC |OPENSSH |PGP )?PRIVATE KEY( BLOCK)?-----"

  # Provider-specific
  - id: anthropic-api-key
    category: Anthropic
    title: Anthropic API Key
    severity: CRITICAL
    keywords: [ANTHROPIC_API_KEY, sk-ant-, anthropic]
    regex: \bsk-ant-[A-Za-z0-9_-]{32,200}\b

  - id: openai-api-key
    category: OpenAI
    title: OpenAI API Key
    severity: CRITICAL
    keywords: [OPENAI_API_KEY, sk-proj-, sk-]
    regex: \bsk-(proj|svcacct|None)-[A-Za-z0-9_-]{32,200}\b

  - id: openai-legacy
    category: OpenAI
    title: OpenAI Legacy Key
    severity: CRITICAL
    keywords: [OPENAI_API_KEY, sk-]
    # Legacy keys are sk- followed by pure alphanumeric (no hyphens).
    # Modern formats (sk-proj-, sk-ant-, sk-svcacct-) contain hyphens
    # and are caught by the openai-api-key and anthropic-api-key rules.
    # RE2-compatible: no negative lookahead needed.
    regex: \bsk-[A-Za-z0-9]{40,64}\b

  - id: github-token
    category: GitHub
    title: GitHub Token
    severity: CRITICAL
    keywords: [ghp_, gho_, GITHUB_TOKEN]
    regex: \bgh[pousr]_[A-Za-z0-9]{36}\b

  - id: aws-access-key
    category: AWS
    title: AWS Access Key
    severity: CRITICAL
    keywords: [AWS_ACCESS_KEY_ID, AKIA, ASIA]
    regex: \b(AKIA|ASIA)[0-9A-Z]{16}\b

  - id: aws-secret-key
    category: AWS
    title: AWS Secret Key
    severity: CRITICAL
    keywords: [AWS_SECRET_ACCESS_KEY, aws_secret_key]
    regex: (?i)(aws_secret_access_key|aws_secret_key)\b.{0,40}['"]?[0-9A-Za-z\/+=]{40}['"]?
