# Strict preset: Container isolation with aggressive scanning
# Enables container isolation and reduces skip lists for more thorough scanning.

preset = "strict"
version = 1

[layers.static]
enabled = true
scanners = ["trivy-secrets", "trivy-misconfig", "bandit", "semgrep"]
skip_dirs = [
    ".venv",
    ".tox",
    "node_modules",
    "__pycache__",
]
skip_files = []  # Scan everything
severity_threshold = "LOW"  # Report all severities
timeout = 600
skip_when_no_files = true

[layers.isolation]
enabled = true
runtime = "podman"

[layers.proxy]
enabled = false
binary = "pipelock"
mode = "balanced"
config = "./pipelock.yaml"

[layers.runtime]
wrappers = true
hooks = true

[layers.audit]
enabled = true
log_dir = "~/.peerlabs/plsec/logs"
integrity = true
