# .trivyignore.yaml -- Suppress known false positives from trivy scanning.
#
# plsec is a security scanning tool whose own source code contains
# scanner config references, detection regex patterns, and test fixtures
# with intentional dummy credentials.  The generic rules match these
# contexts, producing false positives.
#
# Format: https://trivy.dev/docs/latest/configuration/filtering/#trivyignoreyaml

secrets:
  # Source code that references trivy config paths, scanner flags,
  # or contains detection regex patterns.
  - id: generic-secret
    paths:
      - "bin/bootstrap.default.sh"
      - "build/bootstrap.sh"
      - "scripts/test-assembler-escaping.sh"
      - "templates/bootstrap/hook-pre-commit.sh"
      - "templates/bootstrap/plsec-status.sh"
      - "templates/bootstrap/skeleton.bash"
      - "templates/bootstrap/wrapper-scan.sh"
      - "src/plsec/commands/create.py"
      - "src/plsec/commands/secure.py"
      - "src/plsec/configs/templates.py"
      - "src/plsec/core/detector.py"
      - "HANDOFF.md"
      - "PROJECT.md"
      - "docs/DESIGN-AGENT-MONITORING.md"
      - "docs/DESIGN-CREATE-SECURE.md"
      - "docs/build-process-design.md"
      - "docs/commands/plsec-status.md"
      - "docs/roadmap.md"
      - "docs/scanner-limitations.md"
      - "homebrew/README.md"
      - "tests/test_detector.py"
      - "tests/test_templates.py"
      - "tests/engine/test_trivy.py"
      - "tests/bats/test_helper/bats-file/.github/workflows/scorecard.yaml"
    statement: >-
      Source code that references scanner configs, detection patterns,
      or test fixtures.

  # Test fixtures and documentation with intentional example API keys
  - id: generic-api-key
    paths:
      - "tests/test_detector.py"
      - "docs/scanner-limitations.md"
    statement: "Test fixtures and documentation with example API keys for illustration"

  # Test fixtures with intentional dummy Stripe key for detection testing.
  - id: stripe-secret-token
    paths:
      - "tests/test_detector.py"
    statement: "Test fixture with intentional dummy Stripe key"

misconfigurations:
  # Test container -- not production. HEALTHCHECK not needed.
  - id: DS-0026
    paths:
      - "tests/bats/Containerfile"
    statement: "Test container, not production -- HEALTHCHECK not needed"
